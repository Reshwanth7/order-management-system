server:
  port: 9091

spring:
  application:
    name: USER-SERVICE
  datasource:
    url: jdbc:h2:mem:userdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: your-256-bit-secret-key-here-make-it-long-enough-for-hs256
  expiration: 86400000

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
      connect-timeout: 1s
      read-timeout: 10s

logging:
  level:
    zipkin2: DEBUG
    io.micrometer: DEBUG
    org.springframework.web: DEBUG
    zipkin2.reporter: DEBUG
    io.micrometer.tracing: DEBUG
  pattern:
    console: "%d{HH:mm:ss} [%X{traceId}/%X{spanId}] %-5level %logger{36} - %msg%n"