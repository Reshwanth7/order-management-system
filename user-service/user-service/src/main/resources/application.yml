server:
  port: 9091

spring:
  application:
    name: USER-SERVICE        # uppercase — must match lb://USER-SERVICE in gateway exactly
  datasource:
    url: jdbc:h2:mem:userdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
      console:
        enabled: true        # gives you a browser UI at /h2-console

  jpa:
      hibernate:
        ddl-auto: create-drop
      show-sql: true


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: your-256-bit-secret-key-here-make-it-long-enough-for-hs256
  expiration: 86400000   # 24 hours in milliseconds


